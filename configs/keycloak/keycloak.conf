# Use PostgreSQL as the database backend.
db=postgres

# Reject requests not matching KC_HOSTNAME to prevent host header spoofing.
hostname-strict=true

# Trust X-Forwarded-* headers set by Traefik.
proxy-headers=xforwarded

# Listen on HTTP internally, TLS is terminated by Traefik.
http-enabled=true
http-port=8080

# Expose health and metrics on the management port (9000) for healthchecks and observability.
health-enabled=true
metrics-enabled=true

# Single instance — no distributed cache needed.
cache=local
