entryPoints:
  # Redirects all HTTP traffic to HTTPS.
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  # Main HTTPS entrypoint — secure-headers and rate-limit applied to all routes by default.
  websecure:
    address: ":443"
    http:
      middlewares:
        - secure-headers@file
        - rate-limit@file
      tls: {}
  # Isolated entrypoint for healthcheck — not exposed publicly.
  internal:
    address: ":8082"

providers:
  docker:
    # Containers must explicitly opt in via the traefik.enable=true label.
    exposedByDefault: false
    network: proxy
  file:
    directory: /dynamic
    # Reload dynamic config on change without restarting Traefik.
    watch: true

api:
  dashboard: true
  # Dashboard is accessible only via the router defined in docker-compose labels.
  insecure: false

# Ping runs on the internal entrypoint so healthcheck traffic stays off the public port.
ping:
  entryPoint: internal

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      # Drop all headers by default to avoid logging sensitive values.
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep
