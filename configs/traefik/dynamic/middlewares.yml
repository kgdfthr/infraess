http:
  middlewares:
    secure-headers:
      headers:
        # HSTS for 1 year, including subdomains, eligible for browser preload lists.
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # Send HSTS on every response, not just after the browser has cached it.
        forceSTSHeader: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    authentik:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-authentik-username"
          - "X-authentik-groups"
          - "X-authentik-email"
          - "X-authentik-name"
          - "X-authentik-uid"
