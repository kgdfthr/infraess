http:
  middlewares:
    secure-headers:
      headers:
        # HSTS for 1 year, including subdomains, eligible for browser preload lists.
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # Send HSTS on every response, not just after the browser has cached it.
        forceSTSHeader: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    oauth2-proxy:
      forwardAuth:
        address: "http://oauth2-proxy:4180/"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Auth-Request-User"
          - "X-Auth-Request-Email"
        # oauth2-proxy returns no body on auth responses — cap size to prevent memory exhaustion.
        maxResponseBodySize: 32768
