listen_addresses = '*'
# Connection limit — Keycloak default pool is 100, leave headroom for admin connections.
max_connections = 200

# Memory — set to 25% of the container memory limit (256M).
shared_buffers = 64MB

# Allows Postgres to use more memory for complex queries before writing to disk.
work_mem = 4MB

# Used for maintenance tasks like VACUUM and index builds — not latency sensitive.
maintenance_work_mem = 32MB

# Tells the query planner how much of the OS cache is available — helps it make better decisions.
effective_cache_size = 128MB

# WAL settings — minimal durability risk for a dev/demo setup, better write performance.
synchronous_commit = off

# Logging — enough to diagnose slow queries without flooding disk.
log_min_duration_statement = 1000
log_connections = off
log_disconnections = off
log_timezone = 'UTC'

# Timezone
timezone = 'UTC'


