listen_addresses = '*'

# Keycloak connection pool defaults to 100, leave headroom for admin connections.
max_connections = 200

# Memory tuned for a 256MB container limit.
shared_buffers = 64MB
work_mem = 4MB
maintenance_work_mem = 32MB
effective_cache_size = 128MB

# Log queries slower than 1 second to help surface performance issues.
log_min_duration_statement = 1000
log_connections = off
log_disconnections = off

log_timezone = 'UTC'
timezone = 'UTC'
