# Listener
http_address = "0.0.0.0:4180"

# Tells oauth2-proxy it sits behind a reverse proxy passing X-Forwarded headers.
reverse_proxy = true

# OIDC provider — issuer URL passed via OAUTH2_PROXY_OIDC_ISSUER_URL env var.
provider = "oidc"
provider_display_name = "Keycloak"

skip_provider_button = true

# Redirect URL passed via OAUTH2_PROXY_REDIRECT_URL env var.

# Scopes requested from Keycloak on login.
scope = "openid email profile"

# Passes the upstream service's auth headers back through Traefik to the protected service.
set_xauthrequest = true
pass_access_token = true
pass_authorization_header = true

# Cookie settings — secure defaults.
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_expire = "24h"
cookie_refresh = "1h"

# Only allow users from this email domain — remove or adjust to match your setup.
email_domains = ["*"]

# No real upstream — return a static 200 for authenticated forwardauth requests.
upstreams = ["static://200"]

# Silence health check noise in access logs.
silence_ping_logging = true
