http_address = "0.0.0.0:4180"

# Trust X-Forwarded-* headers set by Traefik.
reverse_proxy = true

provider = "oidc"
provider_display_name = "Keycloak"

# Redirect directly to Keycloak login without an intermediate sign-in page.
skip_provider_button = true
scope = "openid email profile"

# Use S256 PKCE to protect the authorization code flow against interception attacks.
code_challenge_method = "S256"

# Forward identity headers to upstream services.
set_xauthrequest = true

cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_expire = "24h"

# Aligned with Keycloak's default access token lifetime to prevent stale sessions.
cookie_refresh = "4m"

# Allow all email domains.
email_domains = ["*"]

# Allow post-login redirects to this domain and its subdomains.
whitelist_domains = [".infraess.com"]

# Scope the session cookie to the parent domain so it is valid across all subdomains.
cookie_domains = [".infraess.com"]

# ForwardAuth mode. Return 200 for authenticated requests.
upstreams = ["static://200"]

# Suppress healthcheck poll entries from access logs.
silence_ping_logging = true
