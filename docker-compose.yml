services:
  # Reverse proxy and TLS termination.
  traefik:
    image: traefik:v3.6
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/certs:/certs:ro
      - ./configs/traefik/dynamic:/dynamic:ro
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=oauth2-proxy@file"
    networks:
      - proxy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:8082/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Identity provider.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    command:
      - start
    environment:
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./configs/keycloak/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
      - ./configs/keycloak/realm-exports:/opt/keycloak/data/import:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - proxy
      - auth
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/9000 && echo -e \"GET /health/ready HTTP/1.0\\n\\n\" >&3 && timeout 3 cat <&3 | grep -q UP'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Database for Keycloak.
  keycloak-postgres:
    image: postgres:16.2
    command: postgres -c config_file=/etc/keycloak-postgres/keycloak-postgres.conf
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres_data:/var/lib/postgresql/data
      - ./configs/keycloak-postgres/keycloak-postgres.conf:/etc/keycloak-postgres/keycloak-postgres.conf:ro
    networks:
      - auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Forward-auth proxy, gates access to protected routes via Keycloak OIDC.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ca.crt
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://${KEYCLOAK_HOSTNAME}/realms/master
      OAUTH2_PROXY_REDIRECT_URL: https://${DOMAIN}/oauth2/callback
    volumes:
      - ./configs/oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
      - ./configs/traefik/certs/local.crt:/etc/ssl/certs/ca.crt:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oauth2-proxy.rule=Host(`${DOMAIN}`) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.oauth2-proxy.entrypoints=websecure"
      - "traefik.http.routers.oauth2-proxy.tls=true"
      - "traefik.http.services.oauth2-proxy.loadbalancer.server.port=4180"
    networks:
      - proxy
      - auth
    extra_hosts:
      - "${KEYCLOAK_HOSTNAME}:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Demo service.
  whoami:
    image: traefik/whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`${DOMAIN}`) && PathPrefix(`/whoami`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.middlewares=oauth2-proxy@file"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  proxy:
    name: proxy
  auth:

volumes:
  keycloak-postgres_data:
