services:
  # Reverse proxy and TLS termination.
  traefik:
    image: traefik:v3.6
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/certs:/certs:ro
      - ./configs/traefik/dynamic:/dynamic:ro
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=authentik@file"
    networks:
      - proxy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:8082/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Identity provider and forward-auth proxy.
  authentik-postgresql:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTHENTIK_DB_NAME}
      POSTGRES_USER: ${AUTHENTIK_DB_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - authentik-postgresql_data:/var/lib/postgresql/data
    networks:
      - auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  authentik-redis:
    image: docker.io/library/redis:7-alpine
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis_data:/data
    networks:
      - auth
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - ./data/authentik/media:/media
      - authentik-templates:/templates
    labels:
      - "traefik.enable=true"
      # Main UI
      - "traefik.http.routers.authentik.rule=Host(`${AUTHENTIK_HOSTNAME}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.service=authentik-svc"
      # Embedded outpost — must be reachable on all protected domains for login redirects.
      - "traefik.http.routers.authentik-outpost.rule=PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.authentik-outpost.entrypoints=websecure"
      - "traefik.http.routers.authentik-outpost.tls=true"
      - "traefik.http.routers.authentik-outpost.service=authentik-svc"
      - "traefik.http.services.authentik-svc.loadbalancer.server.port=9000"
    networks:
      - proxy
      - auth
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - ./data/authentik/media:/media
      - authentik-templates:/templates
    networks:
      - auth
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Log aggregation backend.
  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - logging
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Log collector — scrapes Docker container logs via Docker socket.
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./configs/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - logging
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Log visualization.
  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOSTNAME}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Native OAuth via Authentik — maps groups to Grafana roles.
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Authentik
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${AUTHENTIK_GRAFANA_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${AUTHENTIK_GRAFANA_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid email profile
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://${AUTHENTIK_HOSTNAME}/application/o/authorize/
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://${AUTHENTIK_HOSTNAME}/application/o/token/
      GF_AUTH_GENERIC_OAUTH_API_URL: https://${AUTHENTIK_HOSTNAME}/application/o/userinfo/
      # Map Authentik groups to Grafana roles. Adjust group names to match your Authentik setup.
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: >-
        contains(groups[*], 'role:grafana-admin') && 'Admin' ||
        contains(groups[*], 'role:grafana-writer') && 'Editor' ||
        contains(groups[*], 'role:grafana-reader') && 'Viewer'
      # Deny login if the user is not in any of the above groups.
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: https://${AUTHENTIK_HOSTNAME}/application/o/grafana/end-session/
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA: /etc/ssl/certs/ca.crt
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/traefik/certs/local.crt:/etc/ssl/certs/ca.crt:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOSTNAME}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    extra_hosts:
      - "${AUTHENTIK_HOSTNAME}:host-gateway"
    networks:
      - proxy
      - logging
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Demo API + frontend.
  demo-api:
    build: ./services/demo-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.demo.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.demo.entrypoints=websecure"
      - "traefik.http.routers.demo.tls=true"
      - "traefik.http.routers.demo.middlewares=authentik@file"
      - "traefik.http.services.demo.loadbalancer.server.port=8080"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  proxy:
    name: proxy
  auth:
  logging:

volumes:
  authentik-postgresql_data:
  authentik-redis_data:
  authentik-templates:
  loki_data:
  grafana_data:
